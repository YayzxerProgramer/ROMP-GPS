version: '3.8'

services:
  # PostgreSQL - Gestión de Usuarios
  postgres:
    image: postgres:16-alpine
    container_name: rompgps-postgres
    environment:
      POSTGRES_DB: rompgps_users
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - rompgps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Datos GPS
  mongodb:
    image: mongo:7
    container_name: rompgps-mongodb
    environment:
      MONGO_INITDB_DATABASE: rompgps_data
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - rompgps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caché
  redis:
    image: redis:latest
    container_name: rompgps-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rompgps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  rompgps-network:
    driver: bridge
