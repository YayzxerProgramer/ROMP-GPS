# ============================================
# RompGPS Backend Configuration
# ============================================
spring.application.name=rompgps-backend
server.port=8081

# ============================================
# PostgreSQL - Usuarios (Autenticación)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/rompgps_users
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD:rompgps2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# MongoDB - Datos GPS
# ============================================
spring.data.mongodb.uri=mongodb://localhost:27017/rompgps_data
spring.data.mongodb.database=rompgps_data
spring.data.mongodb.auto-index-creation=true

# ============================================
# Conexión TCP
# ============================================
servidor-tcp.base-url=http://localhost:8080

# ============================================
# Logging
# ============================================
logging.level.com.gpsromp=DEBUG
logging.level.org.springframework.data.redis=DEBUG
